name: Build Nunchaku Windows Wheel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install CUDA 13.0
        uses: Jimver/cuda-toolkit@v0.2.29
        with:
          cuda: '13.0.2'
          method: 'network'
          sub-packages: '["nvcc","cudart","cublas","cublas_dev"]'

      - name: Export CUDA environment
        shell: pwsh
        run: |
          "CUDA_HOME=$env:CUDA_PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CUDACXX=$env:CUDA_PATH\bin\nvcc.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PATH=$env:CUDA_PATH\bin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy packaging ninja setuptools wheel build cmake

      - name: Install PyTorch 2.12 + CUDA 13
        shell: pwsh
        run: |
          python -m pip install torch==2.12.0 torchvision==0.27.0 --index-url https://download.pytorch.org/whl/test/cu130

      - name: Clone Nunchaku source
        shell: pwsh
        run: |
          git clone https://github.com/mit-han-lab/nunchaku.git
          cd nunchaku
          git submodule update --init --recursive

      - name: Verify environment
        shell: pwsh
        working-directory: nunchaku
        run: |
          Write-Host "Python:"
          python --version
          Write-Host "CUDA_PATH=$env:CUDA_PATH"
          Write-Host "CUDA_HOME=$env:CUDA_HOME"
          & "$env:CUDA_PATH\bin\nvcc.exe" --version
          python -c "import torch; print('torch=', torch.__version__); print('torch cuda=', torch.version.cuda)"

      - name: Build wheel
        shell: pwsh
        working-directory: nunchaku
        env:
          CUDA_HOME: C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.0
          CUDA_PATH: C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.0
          CUDACXX: C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.0\bin\nvcc.exe
          NUNCHAKU_VERSION: 1.3.0.dev20260306+cu13.0torch2.12
          NUNCHAKU_INSTALL_MODE: ALL
          NUNCHAKU_BUILD_WHEELS: 1
          TORCH_CUDA_ARCH_LIST: 7.5;8.0;8.6;8.9;12.0+PTX
          DISTUTILS_USE_SDK: 1
          MAX_JOBS: 2
        run: |
          python -m build --wheel --no-isolation

      - name: Copy wheel
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item nunchaku\dist\*.whl dist\

      - name: Rename wheel
        shell: pwsh
        run: |
          $wheel = Get-ChildItem dist\*.whl | Select-Object -First 1
          if (-not $wheel) { throw "No wheel produced." }
          $newName = "nunchaku-1.3.0.dev20260306+cu13.0torch2.12-cp313-cp313-win_amd64.whl"
          Rename-Item $wheel.FullName (Join-Path $wheel.DirectoryName $newName)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nunchaku-windows-wheel
          path: dist\*.whl
