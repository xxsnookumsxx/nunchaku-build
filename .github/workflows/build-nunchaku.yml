name: Build Nunchaku Windows Wheel

on:
  workflow_dispatch: # Allows you to run it manually

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.13
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.13'

      - name: Install CUDA 13.0
        uses: Jimver/cuda-toolkit@master # Using master ensures it has the latest CUDA 13+ mappings
        id: cuda-toolkit
        with:
          cuda: '13.0.0'
          method: 'network'
          # We only need the compiler/libraries to build, not the visual studio integration payload, etc.
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev"]'

      - name: Install Dependencies
        run: |
          pip install ninja setuptools wheel
          pip install torch --index-url https://download.pytorch.org/whl/cu130

      - name: Clone Nunchaku Source
        run: |
          git clone https://github.com/mit-han-lab/nunchaku.git
          cd nunchaku
          git submodule update --init --recursive

      - name: Build Wheel
        shell: bash
        run: |
          cd nunchaku
          export NUNCHAKU_VERSION="1.3.0.dev20260306+cu13.0torch2.12"
          pip wheel . --no-deps -w ../dist/

      - name: Rename Wheel (if needed)
        shell: pwsh
        run: |
          $wheel = Get-ChildItem dist/*.whl | Select-Object -First 1
          if ($wheel) {
            $newName = "nunchaku-1.3.0.dev20260306+cu13.0torch2.12-cp313-cp313-win_amd64.whl"
            Rename-Item $wheel.FullName $newName
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nunchaku-windows-wheel
          path: dist/*.whl
