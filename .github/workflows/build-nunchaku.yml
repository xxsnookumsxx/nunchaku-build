name: Build Nunchaku Windows Wheel

on:
  workflow_dispatch: # Allows you to run it manually

jobs:
  build:
    runs-on: windows-2022
    # Force Node.js 24 for all JavaScript actions in this job
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install CUDA via Chocolatey
        run: |
          choco install cuda -y --version=13.0.0

      - name: Install Dependencies
        run: |
          pip install setuptools wheel ninja
          pip install --pre torch --index-url https://download.pytorch.org/whl/nightly/cu124

      - name: Clone Nunchaku Source
        run: |
          git clone https://github.com/mit-han-lab/nunchaku.git
          cd nunchaku
          git submodule update --init --recursive

      - name: Build Wheel
        shell: bash
        run: |
          cd nunchaku
          # Force the version name you requested
          export NUNCHAKU_VERSION="1.3.0.dev20260306+cu13.0torch2.12"
          pip wheel . --no-deps -w ../dist/

      - name: Rename Wheel (if needed)
        shell: pwsh
        run: |
          $wheel = Get-ChildItem dist/*.whl | Select-Object -First 1
          $newName = "nunchaku-1.3.0.dev20260306+cu13.0torch2.12-cp313-cp313-win_amd64.whl"
          Rename-Item $wheel.FullName $newName

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nunchaku-windows-wheel
          path: dist/*.whl
