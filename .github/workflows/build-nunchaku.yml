name: Build Nunchaku Windows Wheel

on:
  workflow_dispatch: # Allows you to run it manually

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.13
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.13'

      - name: Install CUDA 13.0 via pip wheels
        shell: pwsh
        run: |
          pip install --upgrade pip setuptools wheel
          pip install nvidia-pyindex
          pip install `
            nvidia-cuda-runtime-cu13==13.0.* `
            nvidia-cuda-nvcc-cu13==13.0.* `
            nvidia-cublas-cu13==13.0.* `
            nvidia-cuda-nvrtc-cu13==13.0.*
          # Add CUDA bin to PATH so nvcc is discoverable
          $cudaBin = (python -c "import nvidia.cuda_nvcc; import os; print(os.path.join(os.path.dirname(nvidia.cuda_nvcc.__file__), 'bin'))")
          echo "$cudaBin" >> $env:GITHUB_PATH
          echo "CUDA_PATH=$(python -c "import nvidia.cuda_nvcc; import os; print(os.path.dirname(os.path.dirname(nvidia.cuda_nvcc.__file__)))")" >> $env:GITHUB_ENV

      - name: Install Dependencies
        run: |
          pip install ninja
          pip install torch --index-url https://download.pytorch.org/whl/cu130

      - name: Clone Nunchaku Source
        run: |
          git clone https://github.com/mit-han-lab/nunchaku.git
          cd nunchaku
          git submodule update --init --recursive

      - name: Build Wheel
        shell: bash
        run: |
          cd nunchaku
          export NUNCHAKU_VERSION="1.3.0.dev20260306+cu13.0torch2.12"
          pip wheel . --no-deps -w ../dist/

      - name: Rename Wheel (if needed)
        shell: pwsh
        run: |
          $wheel = Get-ChildItem dist/*.whl | Select-Object -First 1
          $newName = "nunchaku-1.3.0.dev20260306+cu13.0torch2.12-cp313-cp313-win_amd64.whl"
          Rename-Item $wheel.FullName $newName

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nunchaku-windows-wheel
          path: dist/*.whl
